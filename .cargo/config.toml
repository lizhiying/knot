[env]
# macOS ARM64 (Apple Silicon) - 当前激活
ORT_DYLIB_PATH = "/Users/lizhiying/Projects/knot/source/knot-workspaces/knot-app/bin/onnxruntime/macos-arm64/libonnxruntime.dylib"

